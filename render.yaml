services:
  - type: web
    name: career-navigator-ai
    env: docker
    plan: starter # Recommended for AI libraries, change to 'free' if needed
    region: singapore # Choose the region closest to you
    dockerContext: .
    dockerfilePath: Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 10000
      - key: TESSERACT_CMD
        value: tesseract
      - key: GEMINI_API_KEY
        sync: false # Set this in the Render Dashboard
